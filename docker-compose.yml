services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
      POSTGRES_DB: orders
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/api"]
    init: true
    environment:
      POSTGRES_DSN: "postgres://orders:orders@postgres:5432/orders?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_STREAM: "order-events"
      REDIS_CONSUMER_GROUP: "order-processors"
      HTTP_ADDR: ":8080"
      WORKER_COUNT: "8"
      WORKER_READ_COUNT: "50"
      SIMULATE_ACK_FAILURE_AFTER: "${SIMULATE_ACK_FAILURE_AFTER:-0}"
      SIMULATE_ACK_FAILURE_COUNT: "${SIMULATE_ACK_FAILURE_COUNT:-0}"
      RECLAIM_INTERVAL_SECONDS: "5"
      RECLAIM_MIN_IDLE_SECONDS: "10"
      RECLAIM_COUNT: "50"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    stop_grace_period: 15s

  producer:
    profiles: ["load"]
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/producer"]
    init: true
    environment:
      REDIS_ADDR: "redis:6379"
      REDIS_STREAM: "order-events"
      REDIS_CONSUMER_GROUP: "order-processors"
    depends_on:
      redis:
        condition: service_healthy
    stop_grace_period: 15s

volumes:
  postgres-data:
  redis-data:
